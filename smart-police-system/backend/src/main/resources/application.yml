spring:
  profiles:
    active: dev
  application:
    name: smart-police

  thymeleaf:
    cache: false
    encoding: UTF-8
    mode: HTML
    prefix: classpath:/templates/
    suffix: .html

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.police.*.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: SmartPolice-SecretKey-2024-ChangeInProduction-MustBe256Bits
  access-expire: 7200        # 2小时（秒）
  refresh-expire: 604800     # 7天（秒）

# 系统自定义配置
police:
  upload-path: /opt/police/uploads/
  case-no-prefix: AJ
  alarm-no-prefix: BJ
  task-no-prefix: XL
  file:
    # 本地文件存储根目录（落盘用）
    upload-path: ${police.upload-path}
    # 对外访问前缀（前端拼 URL 用）；后端对应 /api/file/download/**
    access-prefix: /api/file/download/
    # 案件证据允许的扩展名（不含点，小写）
    evidence-allow-types: jpg,jpeg,png,gif,webp,bmp,pdf,doc,docx,xls,xlsx,ppt,pptx,txt,zip,rar,7z,mp4,mov,avi,mp3,wav
    # 案件证据单文件上限 10MB
    evidence-max-size: 10485760
    # 头像允许的扩展名
    avatar-allow-types: jpg,jpeg,png,gif,webp
    # 头像单文件上限 2MB
    avatar-max-size: 2097152

# AI 智能配置
ai:
  mimo:
    api-key: ${MIMO_API_KEY:}
    base-url: https://token-plan-cn.xiaomimimo.com/v1
    model-pro: mimo-v2.5-pro
    model-omni: mimo-v2.5-omni
    model-asr: mimo-v2.5-asr
    model-tts: mimo-v2.5-tts
    max-tokens: 1024
    temperature: 0.3
    connect-timeout: 30000
    read-timeout: 120000
