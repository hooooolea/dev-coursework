server:
  port: 8080

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    druid:
      url: jdbc:mysql://localhost:3306/smart_police?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      username: root
      password: 123456   # 修改为你的数据库密码
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      test-while-idle: true
      validation-query: SELECT 1
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin123

  redis:
    host: localhost
    port: 6379
    password:            # 如有密码在此配置
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        min-idle: 0
        max-idle: 8
        max-wait: -1ms

logging:
  level:
    com.police: debug
    org.springframework.security: info
  file:
    name: logs/smart-police.log

# 文件存储配置
police:
  file:
    upload-path: ./uploads
    access-prefix: /api/file/download/
    evidence-max-size: 10485760   # 10 MB
    avatar-max-size: 2097152      # 2 MB
